name: AI Code Review

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - '**.java'
      - '**.js'

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests ruff bandit

      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
          grep -E '\.(py|java|js)$' > changed_files.txt || true
          cat changed_files.txt

      - name: Run AI Code Review
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
        run: |
          python scripts/github_review.py changed_files.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('review_results.json')) {
              const results = JSON.parse(fs.readFileSync('review_results.json'));
              let comment = '## 🔍 AI Code Review Results\n\n';
              comment += `**Overall Score:** ${results.overall_score}/10\n\n`;
              if (results.critical_count > 0) {
                comment += `> ⛔ **${results.critical_count} critical issue(s) found — please fix before merging**\n\n`;
              }
              results.issues.slice(0, 5).forEach(issue => {
                const icon = issue.severity === 'CRITICAL' ? '🔴' : issue.severity === 'HIGH' ? '🟠' : '🟡';
                comment += `${icon} **[${issue.severity}]** ${issue.description} *(Line ${issue.line_start})*\n\n`;
              });
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }