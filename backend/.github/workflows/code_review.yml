name: AI Code Review

on:
  pull_request:
    branches: [main, master]
    paths:
      - '**.py'
      - '**.java'
      - '**.js'

jobs:
  ai-code-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD | \
          grep -E '\.(py|java|js)$' > changed_files.txt || true
          echo "Changed files:"
          cat changed_files.txt

      - name: Run AI Code Review
        env:
          REVIEW_API_URL: ${{ secrets.REVIEW_API_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python scripts/github_review.py changed_files.txt

      - name: Post review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review_results.json')) return;
            
            const r = JSON.parse(fs.readFileSync('review_results.json'));
            const icon = r.critical_count > 0 ? '⛔' : '✅';
            
            let comment = `## 🔍 AI Code Review Results\n\n`;
            comment += `**Overall Score:** ${r.overall_score}/10\n\n`;
            
            if (r.jira_ticket_id) {
              comment += `**Jira Ticket:** ${r.jira_ticket_id}\n`;
              comment += `**Alignment Score:** ${r.alignment_score}/10\n\n`;
            }
            
            if (r.critical_count > 0) {
              comment += `> ${icon} **${r.critical_count} critical issue(s) found — fix before merging**\n\n`;
            } else {
              comment += `> ${icon} **No critical issues found**\n\n`;
            }
            
            if (r.issues && r.issues.length > 0) {
              comment += `### Issues Found\n`;
              const icons = {CRITICAL:'🔴', HIGH:'🟠', MEDIUM:'🟡', LOW:'🟢'};
              r.issues.slice(0, 5).forEach(issue => {
                const i = icons[issue.severity] || '⚪';
                comment += `${i} **[${issue.severity}]** ${issue.description} *(Line ${issue.line_start})*\n\n`;
              });
            }
            
            if (r.alignment_issues && r.alignment_issues.length > 0) {
              comment += `### ⚠️ Jira Requirements Not Met\n`;
              r.alignment_issues.slice(0, 5).forEach(issue => {
                comment += `• ${issue}\n`;
              });
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });